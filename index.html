<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>도로 주소 자동 생성기</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    canvas { border: 1px solid #ccc; display: block; }
    #toolbar { padding: 10px; background: #f0f0f0; }
    button { margin-right: 10px; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="mode='road'">도로 그리기</button>
  <button onclick="mode='building'">건물 추가</button>
</div>

<canvas id="map" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let mode = 'road';
let roads = [];
let buildings = [];
let currentRoad = null;

canvas.addEventListener("click", (e) => {
  const x = e.offsetX;
  const y = e.offsetY;

  if (mode === 'road') {
    if (!currentRoad) {
      currentRoad = { name: "Road " + (roads.length+1), points: [] };
      roads.push(currentRoad);
    }
    currentRoad.points.push({x, y});
  }

  if (mode === 'building') {
    const building = {x, y};
    const road = getClosestRoad(building);
    if (!road) return;

    const number = getAddressNumber(building, road);
    const side = getSideOfRoad(building, road);

    const finalNumber = side === 'left' ? number*2+1 : number*2;

    building.address = road.name + " " + finalNumber;
    buildings.push(building);
  }

  draw();
});

// 거리 계산
function getDistance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// 점 → 선분 거리
function distanceToSegment(p, a, b) {
  const l2 = getDistance(a, b) ** 2;
  if (l2 === 0) return getDistance(p, a);

  let t = ((p.x - a.x)*(b.x - a.x) + (p.y - a.y)*(b.y - a.y)) / l2;
  t = Math.max(0, Math.min(1, t));

  const proj = {
    x: a.x + t*(b.x - a.x),
    y: a.y + t*(b.y - a.y)
  };

  return getDistance(p, proj);
}

// 가장 가까운 도로 찾기
function getClosestRoad(point) {
  let minDist = Infinity;
  let closest = null;

  roads.forEach(road => {
    for (let i=0; i<road.points.length-1; i++) {
      const dist = distanceToSegment(point, road.points[i], road.points[i+1]);
      if (dist < minDist) {
        minDist = dist;
        closest = road;
      }
    }
  });

  return closest;
}

// 점을 선분 위로 투영
function projectPoint(p, a, b) {
  const l2 = getDistance(a, b) ** 2;
  if (l2 === 0) return {on:false};

  let t = ((p.x - a.x)*(b.x - a.x) + (p.y - a.y)*(b.y - a.y)) / l2;
  if (t < 0 || t > 1) return {on:false};

  return {
    on: true,
    distanceAlong: t * Math.sqrt(l2)
  };
}

// 주소 번호 계산
function getAddressNumber(point, road) {
  let total = 0;

  for (let i=0; i<road.points.length-1; i++) {
    const a = road.points[i];
    const b = road.points[i+1];

    const proj = projectPoint(point, a, b);

    if (proj.on) {
      return Math.floor((total + proj.distanceAlong) / 10);
    }

    total += getDistance(a, b);
  }

  return Math.floor(total / 10);
}

// 좌우 판별
function getSideOfRoad(point, road) {
  for (let i=0; i<road.points.length-1; i++) {
    const a = road.points[i];
    const b = road.points[i+1];

    const cross = (b.x - a.x)*(point.y - a.y) - (b.y - a.y)*(point.x - a.x);
    return cross > 0 ? 'left' : 'right';
  }
}

// 그리기
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 도로
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  roads.forEach(r => {
    ctx.beginPath();
    r.points.forEach((p,i)=>{
      if (i===0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    });
    ctx.stroke();
  });

  // 건물
  ctx.fillStyle = 'blue';
  buildings.forEach(b => {
    ctx.fillRect(b.x-3, b.y-3, 6, 6);
    ctx.fillText(b.address, b.x+5, b.y-5);
  });
}
</script>

</body>
</html>
